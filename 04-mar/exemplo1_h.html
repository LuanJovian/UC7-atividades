<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Login</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: monospace;
            color: #ffffff;
        }

        body{
            background-color: #000033;
        }

        main{
            width: 100%;
            max-width: 700px;
            padding: 30px;
            margin: 200px auto 0;
            border-radius: 35px;
            background-color: #002770;
        }

        h1{
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            margin-bottom: 25px;
        }

        form{
            margin: 0 auto;
            padding: 40px;
            margin-bottom: 25px;
            border-radius: 25px;
        }

        label{
            display: inline-block;
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: bold; 
        }


        input{
            width: 100%;
            height: 40px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-size: 16px;
        }
        
        label+input{
            padding: 10px;
            background-color: #ffffff3d;
        }

        section ~ button{
            display: block;
            background-color: #0098fdaf;
            font-size: 18px;
            height: 30px;
            width: 170px;
            border-radius: 15px;
            margin-top: 20px;
        }

        footer{
            text-align: end;
        }
    </style>
</head>

<body>
    <main>
        <header>
            <h1>Login</h1>
        </header>

        <form>
            <section>
                <label for="email">Email</label>
                <input type="email" id="email">
            </section>

            <section>
                <label for="senha">Senha</label>
                <input type="password" id="senha">
            </section>

            <button type="submit">Entrar</button>
        </form>

        <footer>
            <p>© 2026 Sistema Seguro</p>
        </footer>
    </main>
</body>
</html>

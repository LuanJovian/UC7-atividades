<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produtos</title>
    
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body{
            background-color: #f3f3f3;
        }
        
        header{
            border: 1px solid black;
        }
        
        header>h1{
            text-align: center;
            border: 1px solid black;
            margin: 0 auto;
            margin-top: 50px;
            margin-bottom: 40px;
        }

        main{
            width: 100%;
            max-width: 800px;
            border: 1px solid black;
            margin: 0 auto;
        }
        
        main>section{
            background-color: #FFFFFF;
        }
        
      
    </style>
</head>

<body>

    <header>
        <h1>Cadastro de Produtos</h1>
    </header>

    <main>

        <section>
            <h2>Novo Produto</h2>
            <form>
                <label>Nome</label>
                <input type="text">

                <label>Preço</label>
                <input type="number">

                <button type="submit">Cadastrar</button>
            </form>
        </section>

        <section>
            <h2>Lista de Produtos</h2>
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Preço</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Produto Exemplo</td>
                        <td>R$ 100,00</td>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>

</body>
</html>
